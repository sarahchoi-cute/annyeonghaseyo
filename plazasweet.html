<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>플라자 스위트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap"
      rel="stylesheet"
    />
    <style>
      .gowun-dodum-regular {
        font-family: "Gowun Dodum", sans-serif;
        font-weight: 400;
        font-style: normal;
      }

      body {
        background-color: rgb(180, 168, 168);
        font-family: "Gowun Dodum";
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        }

      .container {
        width: 500px;
        height: 500px;
        background-color: #5b8fc7;
        border-radius: 20px;
        }

      .container img {
        width: 100%;
        height: 100%;
        border-radius: 20px;
      }

    </style>
  </head>
  <body>
    <div class="container">
        <img src="plazasweet.jpg"></div>
    <div class="container">
        <img src="Amanda.jpg"></div>
    <div class="container">
        <img src="amandascreaming.jpg">
    </div>
    </div>
    </div>
  </body>
</html>
