<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>최슬아 홈</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap"
      rel="stylesheet"
    />
    <style>
      .gowun-dodum-regular {
        font-family: "Gowun Dodum", sans-serif;
        font-weight: 400;
        font-style: normal;
      }

      body {
        background-color: rgb(180, 168, 168);
        font-family: "Gowun Dodum";
        margin: 0;
      }

      .page {
        min-height: 750px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 60px;
        box-sizing: border-box;
      }

      .top-row {
        width: 90%;
        display: flex;
        justify-content: space-around;
        align-items: center;
        gap: 20px;
      }

      .nav {
        display: flex;
        gap: 20px;
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .nav li {
        background-color: #5b8fc7;
        color: white;
        padding: 16px 24px;
        border-radius: 8px;
        text-align: center;
        font-size: 36px;

        display: flex;
        align-items: center;
        justify-content: center;
        width: 150px;
        height: 150px;
      }

      .nav li.home {
        flex: 1;
        max-width: 200px;
      }

      .nav li a{
        color: white;
        text-decoration: none;
        font-family: inherit;
        font-size: inherit;
      }

      .profile-box {
        width: 420px;
        height: 450px;
        background-color: #5b8fc7;
        border-radius: 12px;
        flex-shrink: 0;
      }

      .greeting {
        color: white;
        font-size: 36px;
        line-height: 1.6;

        writing-mode: vertical-rl;
        text-orientation: upright;
        white-space: nowrap;
      }

      .contact-section {
        display: flex;
        justify-content: center;
        padding-bottom: 80px;
      }

      .contact-box {
        background-color: : transparent;
        border: 2px solid white;
        border-radius: 16px;
        padding: 40px 60px;
        color: white;
        text-align: center;
        width: 500px;
        max-width: 90%
      }

      .contact-box h2{
        margin-top: 0;
        font-size: 28px;
        font-weight: 400;
      }

      .contact-box p{
        font-size: 20px;
        margin: 12px 0;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="top-row">
        <nav>
          <ul class="nav">
            <li class="home"><a href="https://www.youtube.com">영상</a></li>
            <li>
              <a href="plazasweet.html">플라자<br />스위트</a>
            </li>
            <li>
              <a href="people.html">정의의<br />사람들</a>
            </li>
          </ul>
        </nav>
        <div class="profile-box">
          <img src="actor.jpg" width="420px" height="450px" />
        </div>
      </div>

      <div class="greeting">안녕하세요, 최슬아입니다.</div>
    </div>

    <div class="contact-section">
      <div class="contact-box">
        <h2>Contact</h2>
        <p>전화번호: 010-2712-6641</p>
        <p>이메일:chltmfdk777@gmail.com</p>
        <p>인스타그램:@easy___0070</p>
        <p>www.youtube.com/@구스리-k2p</p>
      </div>
    </div>
  </body>
</html>
